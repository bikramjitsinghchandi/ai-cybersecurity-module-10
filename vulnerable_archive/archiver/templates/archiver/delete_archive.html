{% extends 'base.html' %}

{% block title %}Delete Archive{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-md-6">
        <div class="card border-danger">
            <div class="card-header bg-danger text-white">
                <h3>Delete Archive</h3>
            </div>
            <div class="card-body">

                <p>Are you sure you want to delete the archive for:</p>
                <p><strong>{{ archive.title|default:archive.url }}</strong>?</p>
                <p class="text-danger">This action cannot be undone.</p>

                <form method="post">
                    {% csrf_token %}
                    <div class="d-flex gap-2 justify-content-center">
                        <button type="submit" class="btn btn-danger">Yes, Delete</button>
                        <a href="{% url 'archive_list' %}" class="btn btn-secondary">Cancel</a>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
